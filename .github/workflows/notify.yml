name: Notify planner repo

on:
  workflow_run:
    workflows: ["migration-planner-agent-ui-on-push"]
    types:
      - completed
  workflow_dispatch:

jobs:
  notify:
    if: ${{ github.event.workflow_run.conclusion == 'success' }}
    runs-on: ubuntu-latest

    steps:
      - name: Generate GitHub App token
        id: app-token
        uses: actions/create-github-app-token@v1
        with:
          app-id: ${{ secrets.APP_ID }}
          private-key: ${{ secrets.APP_PRIVATE_KEY }}
          owner: aviel281999
          repositories: target
      
      - name: Send repository_dispatch
        run: |
          curl -X POST \
            -H "Authorization: Bearer ${{ steps.app-token.outputs.token }}" \
            -H "Accept: application/vnd.github+json" \
            https://api.github.com/repos/aviel281999/target/dispatches \
            -d '{
              "event_type": "target_repo_updated",
              "client_payload": {
                "sha": "${{ github.event.workflow_run.head_sha }}",
                "repo": "${{ github.event.workflow_run.head_repository.full_name }}"
              }
            }'

